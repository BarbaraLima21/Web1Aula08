<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .campo {
            margin-bottom: 10px;
        }
        input, button {
            padding: 6px;
            font-size: 16px;
        }
        .resultado {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Calcular o Dobro</h2>
    
    <div class="campo">
        <label>Digite um número inteiro:</label>
        <input type="number" id="numero" step="1">
    </div>
    
    <button onclick="calcularDobro()">Calcular</button>
    
    <div class="resultado" id="resultado"></div>

    <script>
        function calcularDobro() {
            let numero = Number(document.getElementById('numero').value);
            let dobro = numero * 2;
            
            document.getElementById('resultado').innerHTML = "O dobro é: " + dobro;
        }
    </script>
</body>
</html>
