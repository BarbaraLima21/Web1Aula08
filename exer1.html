<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: center;
            width: 250px;
        }
        input, button {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            box-sizing: border-box;
            border: 1px solid #aaa;
            border-radius: 4px;
        }
        button {
            background-color: #e1e1e1;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #ddd;
        }
        .resultado {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>Calcular Área do Círculo</h3>
        <label for="raio">Informe o raio:</label>
        <input type="number" id="raio" step="any">
        
        <button onclick="calcularArea()">Área</button>
        
        <div class="resultado" id="resultado"></div>
    </div>

    <script>
        function calcularArea() {
            let raio = Number(document.getElementById('raio').value);
            
            if (raio > 0) {
                let area = Math.PI * (raio * raio);
                document.getElementById('resultado').innerHTML = "Área: " + area.toFixed(2).replace('.', ',');
            } else {
                document.getElementById('resultado').innerHTML = "Insira um raio válido.";
            }
        }
    </script>
</body>
</html>
